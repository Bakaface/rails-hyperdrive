name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ruby: ["3.2", "3.3", "3.4"]
        rails: ["7.2", "8.1"]
    env:
      BUNDLE_GEMFILE: ${{ github.workspace }}/Gemfile
      RAILS_VERSION: ${{ matrix.rails }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          # bundler-cache keys off Gemfile.lock, which we don't check in,
          # and our Gemfile resolves differently per RAILS_VERSION — bake
          # that into the cache version to avoid cross-slot bleed.
          bundler-cache: true
          cache-version: rb${{ matrix.ruby }}-rails${{ matrix.rails }}

      - name: Run specs
        run: bundle exec rspec

  smoke:
    # Smoke runs `bundle install` inside three fixture apps and boots a
    # subprocess Rails server, so it's slow. It runs:
    #   - on every push to `main` (catch regressions before they ship),
    #   - manually via the Actions tab (workflow_dispatch),
    #   - on a PR by applying the `run-smoke` label.
    # Two corner slots cover both Rails majors and both ends of the Ruby
    # range (floor 3.2/7.2, ceiling 3.4/8.1). The generator + live-boot
    # path is where Rails-version differences bite; the regular `test`
    # matrix only exercises it via in-memory Combustion, never a real
    # subprocess install + server boot.
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push' || (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'run-smoke'))
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - ruby: "3.2"
            rails: "7.2"
          - ruby: "3.4"
            rails: "8.1"
    env:
      BUNDLE_GEMFILE: ${{ github.workspace }}/Gemfile
      RAILS_VERSION: ${{ matrix.rails }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
          cache-version: smoke-rb${{ matrix.ruby }}-rails${{ matrix.rails }}

      - name: Run smoke specs
        run: bundle exec rspec --tag smoke
