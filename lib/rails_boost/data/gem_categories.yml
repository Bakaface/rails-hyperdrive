# Maps well-known gem names to their architectural category. Pure metadata —
# adding gems here only changes what `describe_app` and `boost://stack-profile`
# report; it does not alter runtime behavior.

test:
  - rspec
  - rspec-rails
  - minitest
  - minitest-rails
  - test-unit
  - capybara
  - cucumber
  - cucumber-rails

jobs:
  - sidekiq
  - resque
  - delayed_job
  - good_job
  - solid_queue
  - sucker_punch
  - shoryuken
  - que

auth:
  - devise
  - clearance
  - sorcery
  - authlogic
  - rodauth
  - rodauth-rails

authz:
  - pundit
  - cancancan
  - action_policy

frontend:
  - turbo-rails
  - stimulus-rails
  - importmap-rails
  - jsbundling-rails
  - cssbundling-rails
  - view_component
  - phlex
  - phlex-rails
  - hotwire-rails

db:
  - pg
  - mysql2
  - sqlite3
  - trilogy
  - sequel
