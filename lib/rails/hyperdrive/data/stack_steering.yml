# Display labels + per-gem steering for the generated stack.md guideline.
# Sibling to gem_categories.yml (which stays untouched). Adding entries here
# only changes the prose stack.md renders — no runtime behavior.

# Display labels per stack bucket (keys mirror gem_categories.yml buckets).
labels:
  jobs:     "Background jobs"
  auth:     "Authn"
  authz:    "Authz"
  test:     "Testing"
  frontend: "Frontend"

# Per-gem steering clause. Emitted ONLY when that gem is the sole member of
# its bucket present in the lockfile (ambiguous buckets get no steer).
steering:
  sidekiq:     "use `Sidekiq::Job`, not `ActiveJob` wrappers"
  devise:      "do not suggest `has_secure_password` or Rails 8 native auth"
  pundit:      "do not suggest CanCanCan"
  rspec-rails: "do not suggest Minitest"
